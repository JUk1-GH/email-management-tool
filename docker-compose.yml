# Legacy Nextcloud stack kept only for historical reference.
# Current production stack uses jemail-app + jemail-backend instead.
services:
  db:
    image: mariadb:11.4
    container_name: email-tool-db
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    environment:
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./data/db:/var/lib/mysql:Z

  redis:
    image: redis:7-alpine
    container_name: email-tool-redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data:Z

  app:
    image: nextcloud:apache
    container_name: email-tool-nextcloud
    restart: unless-stopped
    depends_on:
      - db
      - redis
    ports:
      - "${NEXTCLOUD_PORT:-8080}:80"
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      OVERWRITEHOST: ${OVERWRITEHOST}
      OVERWRITEPROTOCOL: ${OVERWRITEPROTOCOL}
    volumes:
      - ./data/nextcloud:/var/www/html:Z

  cron:
    image: nextcloud:apache
    container_name: email-tool-cron
    restart: unless-stopped
    depends_on:
      - db
      - redis
    entrypoint: /cron.sh
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
    volumes:
      - ./data/nextcloud:/var/www/html:Z
